<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Mix</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="intro card">
        <h1>X-Mix</h1>
        <p class="muted">隐私转账，4 步完成：连接钱包 -> 填地址 -> 选资产金额 -> 发送</p>
      </header>

      <section class="card">
        <div class="wallet-row">
          <div>
            <p class="label">钱包状态</p>
            <p id="walletStatus" class="mono">未连接</p>
          </div>
          <button id="connectBtn" class="btn">连接 Phantom</button>
        </div>

        <label>
          <span>收币地址</span>
          <textarea
            id="recipient"
            rows="4"
            placeholder="一行一个地址；可选：地址,金额"
          ></textarea>
        </label>

        <div class="inline-fields">
          <label>
            <span>资产</span>
            <select id="assetSelect">
              <option value="sol">SOL</option>
              <option value="usdc">USDC</option>
            </select>
          </label>
          <label>
            <span id="amountLabel">默认转账金额 (SOL)</span>
            <input id="amountSol" type="text" value="0.1" autocomplete="off" />
          </label>
        </div>

        <button id="sendBtn" class="btn btn-primary">确认发送</button>

        <ul class="steps" id="steps">
          <li id="stepDeposit">1. 发起链上 Deposit</li>
          <li id="stepRequest">2. 提交 Withdraw 请求</li>
          <li id="stepDone">3. 等待 Relayer 处理</li>
        </ul>
      </section>

      <section class="card">
        <h2>结果</h2>
        <div class="result-item">
          <p class="label">Deposit 交易</p>
          <a id="txLink" class="mono link" href="#" target="_blank" rel="noreferrer">等待交易</a>
        </div>
        <div class="result-item">
          <p class="label">Request ID</p>
          <p id="requestId" class="mono">-</p>
        </div>
      </section>

      <details class="card">
        <summary>高级信息（Note / 日志）</summary>

        <div class="advanced-block">
          <p class="label">Note（请妥善保存）</p>
          <textarea id="note" rows="8" placeholder="发送后自动生成"></textarea>
          <div class="row">
            <button id="copyNoteBtn" class="btn" type="button">复制 Note</button>
            <button id="downloadNoteBtn" class="btn" type="button">下载 Note</button>
          </div>
        </div>

        <div class="advanced-block">
          <p class="label">状态日志</p>
          <pre id="logBox"></pre>
        </div>
      </details>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
