<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>x-mix DApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="layout">
      <header class="hero panel reveal">
        <p class="eyebrow">X-MIX MAINNET</p>
        <h1>Deposit & Withdraw Console</h1>
        <p class="subtitle">
          连接钱包后可发起 SOL 存款，并直接提交提现请求到 relayer API（不再手工拼 JSON）。
        </p>
      </header>

      <section class="panel reveal delay-1">
        <div class="row between center">
          <div>
            <h2>钱包</h2>
            <p class="muted" id="walletStatus">未连接</p>
          </div>
          <button id="connectBtn" class="btn btn-primary">连接 Phantom</button>
        </div>
      </section>

      <section class="panel reveal delay-2">
        <h2>Deposit 参数</h2>

        <div class="grid two">
          <label>
            <span>RPC URL</span>
            <input id="rpcUrl" type="text" />
          </label>
          <label>
            <span>Program ID</span>
            <input id="programId" type="text" value="XmixQ4DB8MtKcEFhyjWs1gZtdaF3YDuF4ieGLJ3xotv" />
          </label>

          <label>
            <span>Mint (SOL 池用 So111...)</span>
            <input id="mint" type="text" value="So11111111111111111111111111111111111111112" />
          </label>
          <label>
            <span>Asset Type</span>
            <select id="assetType">
              <option value="0" selected>SOL (0)</option>
              <option value="1" disabled>SPL (1, 预留)</option>
            </select>
          </label>

          <label>
            <span>Pool PDA</span>
            <input id="pool" type="text" placeholder="可空，点击下方自动推导" />
          </label>
          <label>
            <span>Vault PDA</span>
            <input id="vault" type="text" placeholder="可空，点击下方自动推导" />
          </label>

          <label>
            <span>存款数量 (SOL)</span>
            <input id="amountSol" type="text" value="0.1" />
          </label>
          <label>
            <span>历史扫描上限</span>
            <input id="scanLimit" type="number" min="20" max="1000" value="120" />
          </label>
        </div>

        <div class="row">
          <label class="checkbox">
            <input id="autoRoot" type="checkbox" checked />
            <span>自动重建 Merkle Root（推荐）</span>
          </label>
        </div>

        <div class="row gap">
          <button id="deriveBtn" class="btn">推导 Pool/Vault</button>
          <button id="depositBtn" class="btn btn-primary">发起 Deposit</button>
        </div>
      </section>

      <section class="panel reveal delay-3">
        <h2>Withdraw 请求（提交到 Relayer API）</h2>

        <div class="grid two">
          <label>
            <span>Relayer API URL</span>
            <input id="relayerApiUrl" type="text" value="http://127.0.0.1:8787" />
          </label>
          <label>
            <span>Recipient</span>
            <input id="withdrawRecipient" type="text" placeholder="接收地址" />
          </label>

          <label>
            <span>Relayer Fee (lamports)</span>
            <input id="relayerFeeLamports" type="text" value="0" />
          </label>
          <label>
            <span>Recipient Amount (lamports，可空)</span>
            <input id="recipientAmountLamports" type="text" placeholder="默认 deposit-fee" />
          </label>
        </div>

        <div class="row gap">
          <button id="fillRecipientBtn" class="btn">使用当前钱包地址</button>
          <button id="buildWithdrawRequestBtn" class="btn btn-primary">
            提交提现请求
          </button>
        </div>

        <div class="grid two">
          <label>
            <span>Request ID</span>
            <input id="requestIdResult" type="text" readonly />
          </label>
          <label>
            <span>Queue File</span>
            <input id="requestFileResult" type="text" readonly />
          </label>
        </div>
      </section>

      <section class="panel reveal delay-4">
        <h2>Note / 交易结果</h2>

        <div class="grid two">
          <label>
            <span>Deposit Signature</span>
            <input id="signature" type="text" readonly />
          </label>
          <label>
            <span>Solscan Link</span>
            <a id="solscanLink" href="#" target="_blank" rel="noreferrer" class="link">等待交易</a>
          </label>
        </div>

        <label>
          <span>Note JSON（可粘贴已有 note）</span>
          <textarea id="note" rows="12"></textarea>
        </label>

        <div class="row gap">
          <button id="copyNoteBtn" class="btn">复制 Note</button>
          <button id="downloadNoteBtn" class="btn">下载 Note</button>
        </div>
      </section>

      <section class="panel reveal delay-4">
        <h2>日志</h2>
        <pre id="logBox" class="log"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
